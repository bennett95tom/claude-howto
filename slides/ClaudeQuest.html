<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Claude Quest - ADHD-Friendly Learning Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title {
            font-size: 2.5em;
            color: #667eea;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .quest-card {
            background: #f8f9fa;
            border: 3px solid #667eea;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .quest-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .quest-card.completed {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .quest-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .quest-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .quest-description {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .quest-xp {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .checkmark {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            flex: 1;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .reward-animation {
            position: fixed;
            font-size: 3em;
            pointer-events: none;
            animation: float-up 2s ease-out forwards;
            z-index: 2000;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        .streak {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .achievements {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .achievements-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }

        .achievement {
            text-align: center;
            font-size: 0.8em;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .achievement.unlocked {
            opacity: 1;
        }

        .achievement-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.7em;
            margin-top: 10px;
        }

        .difficulty-easy {
            background: #4caf50;
            color: white;
        }

        .difficulty-medium {
            background: #ff9800;
            color: white;
        }

        .difficulty-hard {
            background: #f44336;
            color: white;
        }

        .tips {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .tips-title {
            font-weight: bold;
            color: #ff6b00;
            margin-bottom: 10px;
        }

        .tips-text {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎮 Claude Quest</div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-number" id="level">1</span>
                    <span class="stat-label">Level</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="xp">0</span>
                    <span class="stat-label">XP</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="completed">0</span>
                    <span class="stat-label">Quests Done</span>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn-secondary" onclick="toggleAchievements()">🏆 View Achievements</button>
        </div>

        <div class="main-content" id="questContainer"></div>

        <div class="achievements" id="achievementsPanel" style="display: none;">
            <div class="achievements-title">🏆 Your Achievements</div>
            <div class="achievement-grid" id="achievementGrid"></div>
        </div>
    </div>

    <!-- Quest Modal -->
    <div class="modal" id="questModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="tips" id="modalTips"></div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="completeQuest()">✓ I Did It!</button>
                <button class="btn-secondary" onclick="closeModal()">Skip for Now</button>
            </div>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            level: 1,
            xp: 0,
            maxXp: 100,
            completedQuests: new Set(),
            streak: 0,
            lastQuestDate: null,
            achievements: new Set()
        };

        // Load game state from localStorage
        function loadGameState() {
            const saved = localStorage.getItem('claudeQuestState');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.level = data.level;
                gameState.xp = data.xp;
                gameState.maxXp = data.maxXp;
                gameState.completedQuests = new Set(data.completedQuests);
                gameState.streak = data.streak;
                gameState.lastQuestDate = data.lastQuestDate;
                gameState.achievements = new Set(data.achievements);
            }
        }

        // Save game state to localStorage
        function saveGameState() {
            localStorage.setItem('claudeQuestState', JSON.stringify({
                level: gameState.level,
                xp: gameState.xp,
                maxXp: gameState.maxXp,
                completedQuests: Array.from(gameState.completedQuests),
                streak: gameState.streak,
                lastQuestDate: gameState.lastQuestDate,
                achievements: Array.from(gameState.achievements)
            }));
        }

        // Quests
        const quests = [
            {
                id: 'slash-commands-intro',
                icon: '⚡',
                title: 'Slash Command Master',
                description: 'Learn what slash commands do',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What are Slash Commands?</strong><br><br>Slash commands are like keyboard shortcuts for Claude. Instead of explaining what you want each time, you just type:<br><br><code>/optimize</code> - Fixes slow code<br><code>/pr</code> - Prepares pull requests<br><code>/commit</code> - Writes commit messages<br><br>They're your first super-power! Fast, reliable, no thinking needed.`,
                tips: 'Think of them like quick-cast abilities in video games - instant activation!'
            },
            {
                id: 'create-first-slash',
                icon: '✨',
                title: 'Create Your First Slash Command',
                description: 'Set up a simple command you can use',
                xp: 25,
                difficulty: 'medium',
                content: `<strong>Time to level up!</strong><br><br>You're going to create a real slash command. Copy this into <code>.claude/commands/my-command.md</code>:<br><br><code>---<br>prompt: Format this code nicely<br>---<br><br>Please format this code with proper indentation.</code><br><br>Then restart Claude and type <code>/my-command</code> to test it!`,
                tips: 'Start small! Even a simple command saves you time every single time you use it.'
            },
            {
                id: 'memory-basics',
                icon: '🧠',
                title: 'Memory Magic',
                description: 'Teach Claude about your project',
                xp: 15,
                difficulty: 'easy',
                content: `<strong>What is Memory?</strong><br><br>Memory files let you leave sticky notes for Claude. Instead of explaining your coding style every time, you write it once in a file. Claude reads it automatically!<br><br>Types of memory:<br>• Project memory → .claude/CLAUDE.md<br>• Personal preferences → ~/.claude/CLAUDE.md<br>• Directory rules → ./folder/CLAUDE.md`,
                tips: 'Good memory = Claude does things right the first time!'
            },
            {
                id: 'create-memory',
                icon: '📝',
                title: 'Create Your Project Memory',
                description: 'Write your first memory file',
                xp: 20,
                difficulty: 'medium',
                content: `<strong>Let's teach Claude about your project!</strong><br><br>Create a file <code>.claude/CLAUDE.md</code> with:<br><br><code># Our Project Standards<br><br>## Coding Style<br>- Use 2-space indentation<br>- Write comments for complex logic<br><br>## Testing<br>- Write tests for all new features</code><br><br>Now Claude will know these rules automatically!`,
                tips: 'Start with just 3-5 important rules. You can expand later!'
            },
            {
                id: 'skills-intro',
                icon: '🎯',
                title: 'Skills Unlocked',
                description: 'Understand what skills do',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What are Skills?</strong><br><br>Skills are like hiring NPCs to do specialized work. Once set up, they automatically trigger when needed!<br><br>Example: Code Review Skill<br>• You commit code<br>• Skill auto-triggers<br>• Claude reviews it<br>• Posts feedback<br><br>No extra work from you!`,
                tips: 'Skills = automation that learns your patterns'
            },
            {
                id: 'subagents-intro',
                icon: '👥',
                title: 'Meet Your Subagents',
                description: 'Learn about delegating to specialists',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What are Subagents?</strong><br><br>Subagents are specialized Claude instances you can hire to do specific jobs:<br><br>• Data Scientist → Analyzes data<br>• Code Reviewer → Reviews pull requests<br>• Debugger → Finds bugs<br>• Documentor → Writes docs<br><br>You assign them work, they do it while you do something else!`,
                tips: 'Imagine having specialist teammates for everything'
            },
            {
                id: 'mcp-intro',
                icon: '🌉',
                title: 'Open the Portals',
                description: 'Understand MCP connections',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What is MCP?</strong><br><br>MCP = "portals" to your other tools. Set it up once, and Claude can access:<br><br>🔗 GitHub (read code, create issues)<br>📂 Google Drive (read documents)<br>💬 Slack (send messages)<br>🗄️ Databases (query data)<br><br>Live data without copy-paste!`,
                tips: 'MCP = real-time access to everything'
            },
            {
                id: 'hooks-intro',
                icon: '🎣',
                title: 'Set the Traps',
                description: 'Learn about automatic validation',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What are Hooks?</strong><br><br>Hooks = automated checks that run at key moments:<br><br>📋 Pre-check: Before committing<br>• Check for console.log?<br>• Test coverage good?<br><br>🔍 Post-check: After Claude does something<br>• Format looks right?<br>• Security issues?<br><br>No mistakes slip through!`,
                tips: 'Hooks = your safety net'
            },
            {
                id: 'plugins-intro',
                icon: '🎁',
                title: 'Build Your Plugin',
                description: 'Create a shareable package',
                xp: 15,
                difficulty: 'medium',
                content: `<strong>What are Plugins?</strong><br><br>Plugins bundle everything:<br>• Slash commands<br>• Skills<br>• Subagents<br>• MCP configs<br><br>Into ONE package you can share with your team!<br><br>Example: "PR Review Plugin"<br>One click → whole workflow is ready<br>Your team gets instant productivity boost!`,
                tips: 'Plugins = productivity superpowers for your whole team'
            },
            {
                id: 'planning-mode',
                icon: '🗺️',
                title: 'Planning Mode',
                description: 'Let Claude think through problems',
                xp: 15,
                difficulty: 'medium',
                content: `<strong>What is Planning Mode?</strong><br><br>Planning Mode = Claude thinks step-by-step before doing:<br><br>Instead of rushing, Claude:<br>1. Breaks down the problem<br>2. Considers options<br>3. Plans approach<br>4. Executes<br>5. Validates<br><br>Perfect for complex problems!`,
                tips: 'Use Planning Mode for architecture decisions and complex refactors'
            },
            {
                id: 'checkpoints',
                icon: '💾',
                title: 'Save Points',
                description: 'Learn checkpoint system',
                xp: 10,
                difficulty: 'easy',
                content: `<strong>What are Checkpoints?</strong><br><br>Checkpoints = save points before risky moves:<br><br>Before big refactor?<br>→ Create checkpoint<br>→ Try refactor<br>→ If broken, restore checkpoint<br><br>No fear! You can always go back!`,
                tips: 'Checkpoints = unlimited undo button'
            },
            {
                id: 'cli-power',
                icon: '💻',
                title: 'Terminal Power-up',
                description: 'Use Claude from the command line',
                xp: 15,
                difficulty: 'medium',
                content: `<strong>CLI Magic</strong><br><br>Use Claude from terminal:<br><br><code>claude "what does this code do?"</code><br><code>cat file.js | claude /optimize</code><br><code>claude -p "fix this"</code> (silent mode)<br><br>Perfect for scripts and automation!`,
                tips: 'CLI = Claude in your CI/CD pipeline'
            },
            {
                id: 'your-first-workflow',
                icon: '🎬',
                title: 'Build Your First Workflow',
                description: 'Combine features into automation',
                xp: 50,
                difficulty: 'hard',
                content: `<strong>The Big One!</strong><br><br>Combine what you've learned:<br><br>1. Create memory file (project rules)<br>2. Create slash command (/review)<br>3. Set up hook (check before commit)<br>4. Use subagent (assign to reviewer)<br><br>Now: You commit → Auto-review → Feedback<br><br>That's a REAL workflow!`,
                tips: 'Start with one simple workflow, expand from there'
            }
        ];

        // Achievements
        const achievements = [
            { id: 'first-quest', icon: '🎮', name: 'Game Started', description: 'Completed first quest' },
            { id: 'five-quests', icon: '⭐', name: '5 Quests Done', description: 'Completed 5 quests' },
            { id: 'level-3', icon: '⚡', name: 'Level 3!', description: 'Reached level 3' },
            { id: 'level-5', icon: '🔥', name: 'Level 5!', description: 'Reached level 5' },
            { id: 'streak-3', icon: '🔥', name: '3-Day Streak', description: 'Completed quests 3 days in a row' },
            { id: 'all-easy', icon: '✨', name: 'Easy Master', description: 'Completed all easy quests' },
            { id: 'all-medium', icon: '🎯', name: 'Medium Master', description: 'Completed all medium quests' },
            { id: 'all-hard', icon: '💎', name: 'Legend', description: 'Completed all hard quests' }
        ];

        let currentQuestId = null;

        // Initialize game
        function init() {
            loadGameState();
            renderQuests();
            updateStats();
            renderAchievements();
            checkStreakReset();
        }

        // Check if streak should reset
        function checkStreakReset() {
            const today = new Date().toDateString();
            if (gameState.lastQuestDate && gameState.lastQuestDate !== today) {
                const lastDate = new Date(gameState.lastQuestDate);
                const currentDate = new Date(today);
                const diffTime = currentDate - lastDate;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);

                if (diffDays > 1) {
                    gameState.streak = 0;
                }
            }
        }

        // Render quests
        function renderQuests() {
            const container = document.getElementById('questContainer');
            container.innerHTML = '';

            quests.forEach(quest => {
                const isCompleted = gameState.completedQuests.has(quest.id);
                const card = document.createElement('div');
                card.className = `quest-card ${isCompleted ? 'completed' : ''}`;
                card.onclick = () => openQuest(quest.id);

                let difficultyClass = 'difficulty-easy';
                if (quest.difficulty === 'medium') difficultyClass = 'difficulty-medium';
                if (quest.difficulty === 'hard') difficultyClass = 'difficulty-hard';

                card.innerHTML = `
                    ${isCompleted ? '<div class="checkmark">✓</div>' : ''}
                    <div class="quest-icon">${quest.icon}</div>
                    <div class="quest-title">${quest.title}</div>
                    <div class="quest-description">${quest.description}</div>
                    <span class="quest-xp">+${quest.xp} XP</span>
                    <span class="difficulty-badge ${difficultyClass}">${quest.difficulty.toUpperCase()}</span>
                `;

                container.appendChild(card);
            });
        }

        // Open quest
        function openQuest(questId) {
            currentQuestId = questId;
            const quest = quests.find(q => q.id === questId);

            document.getElementById('modalTitle').textContent = `${quest.icon} ${quest.title}`;
            document.getElementById('modalBody').innerHTML = quest.content;
            document.getElementById('modalTips').innerHTML = `<div class="tips-title">💡 Pro Tip</div><div class="tips-text">${quest.tips}</div>`;

            document.getElementById('questModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('questModal').classList.remove('active');
        }

        // Complete quest
        function completeQuest() {
            if (!currentQuestId || gameState.completedQuests.has(currentQuestId)) {
                closeModal();
                return;
            }

            const quest = quests.find(q => q.id === currentQuestId);
            gameState.completedQuests.add(currentQuestId);
            gameState.xp += quest.xp;

            // Update streak
            const today = new Date().toDateString();
            if (gameState.lastQuestDate !== today) {
                gameState.streak++;
            }
            gameState.lastQuestDate = today;

            // Check for level up
            while (gameState.xp >= gameState.maxXp) {
                gameState.xp -= gameState.maxXp;
                gameState.level++;
                gameState.maxXp = Math.floor(gameState.maxXp * 1.2);
                showReward(`🎉 LEVEL UP! Level ${gameState.level}`);
            }

            // Check achievements
            checkAchievements();

            // Save and update
            saveGameState();
            updateStats();
            renderQuests();
            renderAchievements();

            // Show reward
            showReward(`+${quest.xp} XP`);
            closeModal();
        }

        // Check achievements
        function checkAchievements() {
            if (gameState.completedQuests.size === 1) {
                gameState.achievements.add('first-quest');
            }
            if (gameState.completedQuests.size >= 5) {
                gameState.achievements.add('five-quests');
            }
            if (gameState.level >= 3) {
                gameState.achievements.add('level-3');
            }
            if (gameState.level >= 5) {
                gameState.achievements.add('level-5');
            }
            if (gameState.streak >= 3) {
                gameState.achievements.add('streak-3');
            }

            const easyCount = quests.filter(q => q.difficulty === 'easy' && gameState.completedQuests.has(q.id)).length;
            const mediumCount = quests.filter(q => q.difficulty === 'medium' && gameState.completedQuests.has(q.id)).length;
            const hardCount = quests.filter(q => q.difficulty === 'hard' && gameState.completedQuests.has(q.id)).length;

            if (easyCount === quests.filter(q => q.difficulty === 'easy').length) {
                gameState.achievements.add('all-easy');
            }
            if (mediumCount === quests.filter(q => q.difficulty === 'medium').length) {
                gameState.achievements.add('all-medium');
            }
            if (hardCount === quests.filter(q => q.difficulty === 'hard').length) {
                gameState.achievements.add('all-hard');
            }
        }

        // Show reward animation
        function showReward(text) {
            const reward = document.createElement('div');
            reward.className = 'reward-animation';
            reward.textContent = text;
            reward.style.left = Math.random() * window.innerWidth + 'px';
            reward.style.top = window.innerHeight / 2 + 'px';
            document.body.appendChild(reward);

            setTimeout(() => reward.remove(), 2000);
        }

        // Update stats
        function updateStats() {
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('xp').textContent = gameState.xp;
            document.getElementById('completed').textContent = gameState.completedQuests.size;

            const progressPercent = Math.min((gameState.xp / gameState.maxXp) * 100, 100);
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = progressPercent + '%';
            progressFill.textContent = Math.floor(progressPercent) + '%';
        }

        // Render achievements
        function renderAchievements() {
            const grid = document.getElementById('achievementGrid');
            grid.innerHTML = '';

            achievements.forEach(achievement => {
                const unlocked = gameState.achievements.has(achievement.id);
                const div = document.createElement('div');
                div.className = `achievement ${unlocked ? 'unlocked' : ''}`;
                div.innerHTML = `
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div style="font-weight: bold;">${achievement.name}</div>
                    <div style="opacity: 0.7;">${achievement.description}</div>
                `;
                grid.appendChild(div);
            });
        }

        // Toggle achievements panel
        function toggleAchievements() {
            const panel = document.getElementById('achievementsPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
